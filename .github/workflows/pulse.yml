name: Pulse

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: pulse
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run pulse check
        env:
          PULSE_SLACK_WEBHOOK_URL: ${{ secrets.PULSE_SLACK_WEBHOOK_URL }}
          PULSE_SLACK_SEND: "true"
          PULSE_SITES: ${{ vars.PULSE_SITES }}
          PULSE_GAMES: ${{ vars.PULSE_GAMES }}
          PULSE_TIMEOUT_MS: "45000"
          PULSE_HEADLESS: "true"
        run: npm run check
